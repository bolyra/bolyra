<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif" font-size="11">
  <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold">FIG. 2 — HumanUniqueness Circuit (200)</text>

  <!-- Column headers -->
  <text x="80" y="50" font-weight="bold" font-size="12" fill="#333">PRIVATE INPUTS</text>
  <text x="350" y="50" font-weight="bold" font-size="12" fill="#333">CIRCUIT OPERATIONS</text>
  <text x="650" y="50" font-weight="bold" font-size="12" fill="#333">PUBLIC OUTPUTS</text>

  <!-- Private inputs -->
  <rect x="40" y="65" width="180" height="30" rx="3" fill="#e8e8ff" stroke="#666"/>
  <text x="130" y="85" text-anchor="middle" font-size="11">secret (EdDSA scalar)</text>

  <rect x="40" y="110" width="180" height="30" rx="3" fill="#e8e8ff" stroke="#666"/>
  <text x="130" y="130" text-anchor="middle" font-size="11">merkleProof[20]</text>

  <!-- Public inputs -->
  <rect x="40" y="170" width="180" height="30" rx="3" fill="#ffe8e8" stroke="#666"/>
  <text x="130" y="190" text-anchor="middle" font-size="11">scope (public)</text>

  <rect x="40" y="215" width="180" height="30" rx="3" fill="#ffe8e8" stroke="#666"/>
  <text x="130" y="235" text-anchor="middle" font-size="11">sessionNonce (public)</text>

  <!-- Step 1: BabyPbk -->
  <rect x="290" y="65" width="200" height="40" rx="3" fill="#fff" stroke="black" stroke-width="1.5"/>
  <text x="390" y="82" text-anchor="middle" font-weight="bold">Step 1: BabyPbk()</text>
  <text x="390" y="97" text-anchor="middle" font-size="10">secret → (Ax, Ay)</text>
  <line x1="220" y1="80" x2="290" y2="80" stroke="black" marker-end="url(#arr)"/>

  <!-- Step 2: Poseidon2 identity -->
  <rect x="290" y="125" width="200" height="40" rx="3" fill="#fff" stroke="black" stroke-width="1.5"/>
  <text x="390" y="142" text-anchor="middle" font-weight="bold">Step 2: Poseidon2</text>
  <text x="390" y="157" text-anchor="middle" font-size="10">identityCommitment = hash(Ax, Ay)</text>
  <line x1="390" y1="105" x2="390" y2="125" stroke="black" marker-end="url(#arr)"/>

  <!-- Step 3: BinaryMerkleRoot -->
  <rect x="290" y="185" width="200" height="40" rx="3" fill="#fff" stroke="black" stroke-width="1.5"/>
  <text x="390" y="202" text-anchor="middle" font-weight="bold">Step 3: MerkleRoot(20)</text>
  <text x="390" y="217" text-anchor="middle" font-size="10">leaf=identityCommitment</text>
  <line x1="390" y1="165" x2="390" y2="185" stroke="black" marker-end="url(#arr)"/>
  <line x1="220" y1="125" x2="290" y2="200" stroke="#999" stroke-dasharray="4"/>

  <!-- Step 4: Nullifier -->
  <rect x="290" y="250" width="200" height="40" rx="3" fill="#fff" stroke="black" stroke-width="1.5"/>
  <text x="390" y="267" text-anchor="middle" font-weight="bold">Step 4: Poseidon2</text>
  <text x="390" y="282" text-anchor="middle" font-size="10">nullifier = hash(scope, secret)</text>
  <line x1="220" y1="185" x2="290" y2="265" stroke="#999" stroke-dasharray="4"/>
  <line x1="220" y1="80" x2="270" y2="270" stroke="#999" stroke-dasharray="4"/>

  <!-- Step 5: Nonce binding -->
  <rect x="290" y="315" width="200" height="40" rx="3" fill="#fff" stroke="black" stroke-width="1.5"/>
  <text x="390" y="332" text-anchor="middle" font-weight="bold">Step 5: Poseidon2</text>
  <text x="390" y="347" text-anchor="middle" font-size="10">nonceBinding = hash(nullifier, nonce)</text>
  <line x1="390" y1="290" x2="390" y2="315" stroke="black" marker-end="url(#arr)"/>
  <line x1="220" y1="230" x2="290" y2="330" stroke="#999" stroke-dasharray="4"/>

  <!-- Step 6: Range check -->
  <rect x="290" y="380" width="200" height="35" rx="3" fill="#fff8e0" stroke="#999"/>
  <text x="390" y="401" text-anchor="middle" font-size="10">Step 6: Num2Bits(251) range check</text>

  <!-- Public outputs -->
  <rect x="580" y="185" width="180" height="30" rx="3" fill="#e0ffe0" stroke="#060"/>
  <text x="670" y="205" text-anchor="middle" font-weight="bold">humanMerkleRoot</text>
  <line x1="490" y1="205" x2="580" y2="200" stroke="black" marker-end="url(#arr)"/>

  <rect x="580" y="250" width="180" height="30" rx="3" fill="#e0ffe0" stroke="#060"/>
  <text x="670" y="270" text-anchor="middle" font-weight="bold">nullifierHash</text>
  <line x1="490" y1="270" x2="580" y2="265" stroke="black" marker-end="url(#arr)"/>

  <rect x="580" y="315" width="180" height="30" rx="3" fill="#e0ffe0" stroke="#060"/>
  <text x="670" y="335" text-anchor="middle" font-weight="bold">nonceBinding</text>
  <line x1="490" y1="335" x2="580" y2="330" stroke="black" marker-end="url(#arr)"/>

  <!-- Constraint count -->
  <text x="400" y="445" text-anchor="middle" font-size="12" fill="#666">16,409 R1CS constraints · Groth16 · 0.57s proof · 722 bytes</text>
  <text x="400" y="465" text-anchor="middle" font-size="11" fill="#666">Compatible with Semaphore v4 identity scheme (EdDSA on Baby Jubjub)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>
</svg>
