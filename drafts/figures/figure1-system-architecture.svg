<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="Arial, sans-serif" font-size="12">
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="bold">FIG. 1 — System Architecture (100)</text>

  <!-- Outer box -->
  <rect x="30" y="40" width="740" height="560" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="62" text-anchor="middle" font-size="13" font-weight="bold">System (100)</text>

  <!-- Human Identity Subsystem -->
  <rect x="60" y="80" width="300" height="180" rx="3" fill="#f0f4ff" stroke="black" stroke-width="1.5"/>
  <text x="210" y="102" text-anchor="middle" font-weight="bold" font-size="12">Human Identity Subsystem (110)</text>
  <line x1="80" y1="110" x2="340" y2="110" stroke="black" stroke-width="0.5"/>
  <text x="80" y="130" font-size="11">EdDSA keypair (Baby Jubjub curve)</text>
  <text x="80" y="148" font-size="11">Secret scalar → BabyPbk → (Ax, Ay)</text>
  <text x="80" y="166" font-size="11">Identity commitment = Poseidon2(Ax, Ay)</text>
  <text x="80" y="184" font-size="11">Nullifier = Poseidon2(scope, secret)</text>
  <text x="80" y="202" font-size="11">Nonce binding = Poseidon2(nullifier, nonce)</text>
  <text x="80" y="224" font-size="11" font-weight="bold">Proving system: Groth16</text>
  <text x="80" y="242" font-size="10" fill="#666">16,409 constraints · 0.57s proof</text>

  <!-- Agent Credential Subsystem -->
  <rect x="440" y="80" width="300" height="180" rx="3" fill="#fff0f0" stroke="black" stroke-width="1.5"/>
  <text x="590" y="102" text-anchor="middle" font-weight="bold" font-size="12">Agent Credential Subsystem (120)</text>
  <line x1="460" y1="110" x2="720" y2="110" stroke="black" stroke-width="0.5"/>
  <text x="460" y="130" font-size="11">Model hash + Operator EdDSA key</text>
  <text x="460" y="148" font-size="11">Permission bitmask (64-bit)</text>
  <text x="460" y="166" font-size="11">Expiry timestamp</text>
  <text x="460" y="184" font-size="11">Credential = Poseidon5(model, Ax, Ay,</text>
  <text x="485" y="200" font-size="11">bitmask, expiry)</text>
  <text x="460" y="220" font-size="11">Scope commit = Poseidon2(bitmask, cred)</text>
  <text x="460" y="242" font-size="11" font-weight="bold">Proving system: PLONK</text>
  <text x="460" y="256" font-size="10" fill="#666">20,832 constraints · 16.3s proof</text>

  <!-- Arrows down -->
  <line x1="210" y1="260" x2="210" y2="310" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="290" font-size="10" fill="#333">humanProof (Groth16)</text>
  <line x1="590" y1="260" x2="590" y2="310" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="290" font-size="10" fill="#333">agentProof (PLONK)</text>

  <!-- IdentityRegistry Contract -->
  <rect x="60" y="310" width="680" height="270" rx="3" fill="#f0fff0" stroke="black" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" font-weight="bold" font-size="13">IdentityRegistry Contract (130)</text>
  <text x="400" y="352" text-anchor="middle" font-size="10" fill="#666">Solidity 0.8.24 · Base L2 · ~590k gas per handshake</text>
  <line x1="80" y1="360" x2="720" y2="360" stroke="black" stroke-width="0.5"/>

  <!-- Left column: Trees -->
  <text x="90" y="382" font-weight="bold" font-size="11">Merkle Trees</text>
  <text x="90" y="400" font-size="11">humanTree (LeanIMT, depth 20)</text>
  <text x="90" y="416" font-size="11">agentTree (LeanIMT, depth 20)</text>
  <text x="90" y="436" font-weight="bold" font-size="11">Root History (CIP-2)</text>
  <text x="90" y="452" font-size="11">humanRootHistory[30]</text>
  <text x="90" y="468" font-size="11">agentRootHistory[30]</text>

  <!-- Right column: State -->
  <text x="420" y="382" font-weight="bold" font-size="11">State Mappings</text>
  <text x="420" y="400" font-size="11">usedNonces (replay protection)</text>
  <text x="420" y="416" font-size="11">humanRevocations (nullifier-keyed)</text>
  <text x="420" y="436" font-size="11">lastScopeCommitment (chain state)</text>
  <text x="420" y="452" font-size="11">usedDelegationNullifiers</text>
  <text x="420" y="468" font-size="11">delegationHopCount (max 3)</text>

  <!-- Functions -->
  <line x1="80" y1="480" x2="720" y2="480" stroke="black" stroke-width="0.5"/>
  <text x="90" y="500" font-weight="bold" font-size="11">Functions</text>
  <text x="90" y="518" font-size="11">verifyHandshake(humanProof, agentProof, nonce)</text>
  <text x="90" y="536" font-size="11">verifyDelegation(proof, pubSignals, nonce)</text>
  <text x="90" y="554" font-size="11">enrollHuman(commitment) · enrollAgent(commitment)</text>
  <text x="90" y="572" font-size="11">revokeHuman(nullifier) · revokeAgent(commitment, siblings)</text>

  <!-- Layer 2 label -->
  <text x="400" y="610" text-anchor="middle" font-size="12" fill="#666">Layer 2 Blockchain (Base)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
