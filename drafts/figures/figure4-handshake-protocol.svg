<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 620" font-family="Arial, sans-serif" font-size="11">
  <text x="375" y="22" text-anchor="middle" font-size="14" font-weight="bold">FIG. 4 — Mutual Handshake Protocol (400)</text>

  <!-- Lifelines -->
  <text x="120" y="55" text-anchor="middle" font-weight="bold" font-size="13">HUMAN (110)</text>
  <line x1="120" y1="65" x2="120" y2="590" stroke="black" stroke-width="1" stroke-dasharray="6"/>

  <text x="375" y="55" text-anchor="middle" font-weight="bold" font-size="13">VERIFIER / dApp</text>
  <line x1="375" y1="65" x2="375" y2="590" stroke="#999" stroke-width="1" stroke-dasharray="6"/>

  <text x="630" y="55" text-anchor="middle" font-weight="bold" font-size="13">AGENT (120)</text>
  <line x1="630" y1="65" x2="630" y2="590" stroke="black" stroke-width="1" stroke-dasharray="6"/>

  <!-- Step 1: Nonce -->
  <rect x="270" y="80" width="210" height="30" rx="3" fill="#fff8e0" stroke="#b90"/>
  <text x="375" y="100" text-anchor="middle" font-size="11">1. Generate sessionNonce (random)</text>
  <line x1="270" y1="95" x2="120" y2="95" stroke="black" marker-end="url(#ar4)"/>
  <line x1="480" y1="95" x2="630" y2="95" stroke="black" marker-end="url(#ar4)"/>

  <!-- Step 2: Human proof (parallel) -->
  <rect x="40" y="130" width="160" height="65" rx="3" fill="#e8e8ff" stroke="#66a"/>
  <text x="120" y="148" text-anchor="middle" font-weight="bold" font-size="10">2. Generate Groth16</text>
  <text x="120" y="163" text-anchor="middle" font-size="10">HumanUniqueness proof</text>
  <text x="120" y="178" text-anchor="middle" font-size="9" fill="#666">~0.57s (parallel)</text>

  <!-- Step 3: Agent proof (parallel) -->
  <rect x="550" y="130" width="160" height="65" rx="3" fill="#ffe8e8" stroke="#a66"/>
  <text x="630" y="148" text-anchor="middle" font-weight="bold" font-size="10">3. Generate PLONK</text>
  <text x="630" y="163" text-anchor="middle" font-size="10">AgentPolicy proof</text>
  <text x="630" y="178" text-anchor="middle" font-size="9" fill="#666">~16.3s (parallel)</text>

  <!-- Parallel indicator -->
  <text x="375" y="165" text-anchor="middle" font-size="10" fill="#999">PARALLEL</text>

  <!-- Submit to chain -->
  <line x1="120" y1="215" x2="375" y2="230" stroke="black" marker-end="url(#ar4)"/>
  <text x="200" y="212" font-size="9">humanProof + pubSignals</text>
  <line x1="630" y1="215" x2="375" y2="230" stroke="black" marker-end="url(#ar4)"/>
  <text x="530" y="212" font-size="9">agentProof + pubSignals</text>

  <!-- On-chain verification box -->
  <rect x="245" y="240" width="260" height="310" rx="3" fill="#f0fff0" stroke="black" stroke-width="2"/>
  <text x="375" y="260" text-anchor="middle" font-weight="bold" font-size="12">IdentityRegistry.verifyHandshake()</text>
  <text x="375" y="275" text-anchor="middle" font-size="9" fill="#666">Single blockchain transaction</text>

  <!-- Steps 4-10 -->
  <text x="260" y="298" font-size="10">4. Check nonce freshness (usedNonces)</text>
  <text x="260" y="316" font-size="10">5. Mark nonce as used</text>
  <text x="260" y="334" font-size="10">6. Enforce nonce equality across proofs</text>
  <text x="275" y="349" font-size="9" fill="#666">humanPubSignals[4] == agentPubSignals[5] == nonce</text>
  <text x="260" y="367" font-size="10">7. Check human nullifier not revoked</text>
  <text x="260" y="385" font-size="10">8. Verify humanMerkleRoot in history</text>
  <text x="260" y="403" font-size="10">9. Verify agentMerkleRoot in history</text>
  <text x="260" y="421" font-size="10" font-weight="bold">10. Verify Groth16 proof (human)</text>
  <text x="260" y="439" font-size="10" font-weight="bold">11. Verify PLONK proof (agent)</text>
  <text x="260" y="460" font-size="10" fill="#060">12. Store scopeCommitment → chain state</text>
  <text x="275" y="475" font-size="9" fill="#666">lastScopeCommitment[nonce] = agentPubSignals[2]</text>

  <!-- Event -->
  <rect x="270" y="488" width="210" height="25" rx="3" fill="#e0ffe0" stroke="#060"/>
  <text x="375" y="505" text-anchor="middle" font-size="10" font-weight="bold">emit HandshakeVerified()</text>

  <!-- Result arrows -->
  <line x1="375" y1="525" x2="120" y2="560" stroke="black" marker-end="url(#ar4)"/>
  <line x1="375" y1="525" x2="630" y2="560" stroke="black" marker-end="url(#ar4)"/>
  <text x="375" y="580" text-anchor="middle" font-size="11" fill="#060">Both parties know counterparty satisfies policy. Neither learns identity.</text>

  <!-- Gas note -->
  <text x="375" y="610" text-anchor="middle" font-size="10" fill="#666">~590,000 gas on Base L2 (~$0.15-0.30)</text>

  <defs>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>
</svg>
