services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bolyra_registry
      POSTGRES_USER: bolyra
      POSTGRES_PASSWORD: bolyra_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  registry:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://bolyra:bolyra_dev@postgres:5432/bolyra_registry
      REGISTRY_API_KEY: dev-test-key-change-in-production
      PORT: 3100
    depends_on:
      - postgres

volumes:
  pgdata:
