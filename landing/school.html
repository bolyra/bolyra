<meta name="description" content="A 13-scene animated explainer of zero-knowledge identity for AI agents. Learn how Bolyra proves who you are without revealing secrets.">

<style>
html, body { margin: 0; padding: 0; background: #0a0a0a; overflow: hidden; width: 100%; height: 100%; }
#root { width: 100%; height: 100%; }
.loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #888; font-family: 'Fredoka', sans-serif; font-size: 24px; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="loading">Loading Bolyra School...</div></div>
<script>
// Load JSX files in order via Babel standalone, then mount the app.
// Each file sets globals on window that subsequent files read.
async function loadAndTranspile(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to load ' + url + ': ' + res.status);
  const code = await res.text();
  const transformed = Babel.transform(code, {
    presets: [['react', { runtime: 'classic' }]],
    sourceType: 'script',
  }).code;
  // Use indirect eval to run in global scope (new Function scopes const/let)
  (0, eval)(transformed);
}

(async () => {
  try {
    await loadAndTranspile('school-animations.jsx');
    await loadAndTranspile('school-kit.jsx');
    await loadAndTranspile('school-scenes.jsx');
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.BolyraExplainer));
  } catch (err) {
    console.error('Bolyra School load error:', err);
    document.getElementById('root').innerHTML =
      '<div class="loading" style="color:#f87171">Failed to load. Check console.</div>';
  }
})();
</script>
</body>
</html>
