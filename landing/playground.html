<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --bg-elevated: #111113; --bg-code: #1a1a2e;
  --text: #e0e0e0; --text-muted: #888; --accent: #6366f1; --accent-hover: #818cf8;
  --green: #4ade80; --red: #f87171; --orange: #fb923c; --cyan: #22d3ee;
  --border: #222; --max-width: 900px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  -webkit-font-smoothing: antialiased; min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--accent-hover); }
code, .mono { font-family: 'JetBrains Mono', monospace; }
.container { max-width: var(--max-width); margin: 0 auto; padding: 0 20px; }

/* Nav */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,10,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); }
nav .container { display: flex; align-items: center; justify-content: space-between; height: 56px; }
nav .logo { font-size: 1.15rem; font-weight: 700; color: var(--text); }
nav .nav-links { display: flex; gap: 20px; list-style: none; }
nav .nav-links a { color: var(--text-muted); font-size: 0.875rem; }
nav .nav-links a:hover { color: var(--text); }

/* Layout */
main { padding-top: 80px; padding-bottom: 60px; }
h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
h1 span { color: var(--accent); }
.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 28px; }

/* Tabs */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab-btn { background: none; border: none; color: var(--text-muted); font-family: inherit;
  font-size: 0.9rem; padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Shared components */
.card { background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
.btn { display: inline-block; padding: 8px 18px; border-radius: 6px; border: none;
  font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--bg-code); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem;
  font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.badge-pass { background: rgba(74,222,128,0.15); color: var(--green); }
.badge-fail { background: rgba(248,113,113,0.15); color: var(--red); }
.badge-skip { background: rgba(136,136,136,0.15); color: var(--text-muted); }
.json-block { background: var(--bg-code); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
  max-height: 260px; overflow-y: auto; color: var(--text-muted); }

/* Checkbox grid */
.perm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.perm-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
.perm-item input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
.perm-item .bit { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }

/* Input */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-code); color: var(--text); font-family: inherit; font-size: 0.85rem; }
.field textarea { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; resize: vertical; min-height: 120px; }

/* Pipeline steps */
.pipeline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.step { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elevated);
  transition: all 0.4s ease; }
.step.pass { border-color: var(--green); background: rgba(74,222,128,0.05); }
.step.fail { border-color: var(--red); background: rgba(248,113,113,0.05); }
.step.skip { opacity: 0.4; }
.step .icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
.step.pass .icon { background: rgba(74,222,128,0.2); color: var(--green); }
.step.fail .icon { background: rgba(248,113,113,0.2); color: var(--red); }
.step .info { flex: 1; }
.step .info .name { font-weight: 600; font-size: 0.85rem; }
.step .info .detail { font-size: 0.75rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

/* Scenario buttons */
.scenarios { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

/* Result */
.result-box { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-weight: 600; }
.result-box.allowed { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
.result-box.denied { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.result-box .reason { font-weight: 400; font-size: 0.8rem; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

/* Two-col layout */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  .perm-grid { grid-template-columns: 1fr; }
  .tab-btn { padding: 8px 12px; font-size: 0.8rem; }
  .scenarios { flex-direction: column; }
}
</style>
</head>
<body>

<nav>
  <div class="container">
    <a class="logo" href="/">Bolyra</a>

<main class="container">
  <h1>Bolyra <span>Playground</span></h1>
  <p class="subtitle">Try agent auth in your browser. No install, no backend, no real keys.</p>
  <div id="app"></div>
</main>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Permission model ──
const PERMISSIONS = [
  { bit: 0, name: 'READ_DATA', label: 'Read Data' },
  { bit: 1, name: 'WRITE_DATA', label: 'Write Data' },
  { bit: 2, name: 'FINANCIAL_SMALL', label: 'Financial Small (<$100)' },
  { bit: 3, name: 'FINANCIAL_MEDIUM', label: 'Financial Medium (<$10K)' },
  { bit: 4, name: 'FINANCIAL_UNLIMITED', label: 'Financial Unlimited' },
  { bit: 5, name: 'SIGN_ON_BEHALF', label: 'Sign on Behalf' },
  { bit: 6, name: 'SUB_DELEGATE', label: 'Sub-Delegate' },
  { bit: 7, name: 'ACCESS_PII', label: 'Access PII' },
];

// Cumulative rules: higher financial tiers imply lower
const IMPLIES = { 4: [3, 2], 3: [2] };

function enforceCumulative(bits) {
  const s = new Set(bits);
  for (const [k, deps] of Object.entries(IMPLIES)) {
    if (s.has(Number(k))) deps.forEach(d => s.add(d));
  }
  return [...s].sort((a, b) => a - b);
}

function bitmaskFromBits(bits) {
  let mask = 0;
  bits.forEach(b => mask |= (1 << b));
  return mask;
}

function bitsFromMask(mask) {
  const bits = [];
  for (let i = 0; i < 8; i++) if (mask & (1 << i)) bits.push(i);
  return bits;
}

function amountCap(bits) {
  if (bits.includes(4)) return 'Unlimited';
  if (bits.includes(3)) return '$10,000';
  if (bits.includes(2)) return '$100';
  return 'None';
}

// ── Crypto helpers ──
function randomHex(bytes) {
  const arr = new Uint8Array(bytes);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

function randomAddress() {
  return '0x' + randomHex(20);
}

async function generateEd25519Keypair() {
  try {
    const kp = await crypto.subtle.generateKey('Ed25519', true, ['sign', 'verify']);
    const pub = await crypto.subtle.exportKey('raw', kp.publicKey);
    return {
      keyPair: kp,
      publicKeyHex: Array.from(new Uint8Array(pub)).map(b => b.toString(16).padStart(2, '0')).join(''),
    };
  } catch {
    return null; // browser doesn't support Ed25519
  }
}

async function signEd25519(keyPair, data) {
  const enc = new TextEncoder().encode(JSON.stringify(data));
  const sig = await crypto.subtle.sign('Ed25519', keyPair.privateKey, enc);
  return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Demo presets ──
const DEMO_PRESETS = {
  autonomous: {
    label: 'Autonomous Agent',
    description: 'Full lifecycle: agent owns its keypair, human issues a scoped credential, gateway enforces policy. Shows how Bolyra proves what an agent is allowed to do.',
    tools: [
      { name: 'read_market_data', label: 'read_market_data', requiredBits: [0], financial: false },
      { name: 'write_analytics', label: 'write_analytics', requiredBits: [0, 1], financial: false },
      { name: 'buy_research', label: 'buy_research ($)', requiredBits: [0, 2], financial: true },
      { name: 'gpu_inference', label: 'gpu_inference ($)', requiredBits: [0, 2], financial: true },
      { name: 'wire_transfer', label: 'wire_transfer ($$)', requiredBits: [0, 3], financial: true },
    ],
  },
  robinhood: {
    label: 'Robinhood Agentic Trading',
    description: 'Simulates @bolyra/gateway protecting a Robinhood Agentic Trading MCP server.',
    tools: [
      { name: 'get_portfolio', label: 'get_portfolio', requiredBits: [0], financial: false },
      { name: 'get_stock_quote', label: 'get_stock_quote', requiredBits: [0], financial: false },
      { name: 'place_stock_order', label: 'place_stock_order ($)', requiredBits: [0, 2], financial: true },
      { name: 'place_option_order', label: 'place_option_order ($$)', requiredBits: [0, 3], financial: true },
      { name: 'cancel_order', label: 'cancel_order', requiredBits: [0, 1], financial: false },
    ],
  },
  coinbase: {
    label: 'Coinbase Agent Account',
    description: 'Simulates @bolyra/gateway protecting a Coinbase AgentKit MCP server on Base.',
    tools: [
      { name: 'get_wallet_balance', label: 'get_wallet_balance', requiredBits: [0], financial: false },
      { name: 'get_portfolio', label: 'get_portfolio', requiredBits: [0], financial: false },
      { name: 'transfer_token', label: 'transfer_token ($)', requiredBits: [0, 2], financial: true },
      { name: 'swap_tokens', label: 'swap_tokens ($)', requiredBits: [0, 2], financial: true },
      { name: 'pay_for_api', label: 'pay_for_api (x402)', requiredBits: [0, 2], financial: true },
      { name: 'deploy_contract', label: 'deploy_contract ($$$)', requiredBits: [0, 4], financial: true },
    ],
  },
  x402: {
    label: 'x402 Agent Wallet',
    description: 'Simulates an agent wallet auto-paying x402 API requests with human-delegated spend limits on Base.',
    tools: [
      { name: 'research_nvda', label: 'research_nvda ($0.50)', requiredBits: [0, 2], financial: true },
      { name: 'research_btc', label: 'research_btc ($0.25)', requiredBits: [0, 2], financial: true },
      { name: 'gpu_inference', label: 'gpu_inference ($1.00)', requiredBits: [0, 2], financial: true },
      { name: 'market_feed', label: 'market_feed ($0.10)', requiredBits: [0, 2], financial: true },
      { name: 'premium_report', label: 'premium_report ($5.00)', requiredBits: [0, 4], financial: true },
    ],
  },
};

// Default to robinhood
const TOOLS = DEMO_PRESETS.robinhood.tools;

// ── Shared components ──
function CodeBlock({ data, maxHeight }) {
  const json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  return <pre className="json-block" style={maxHeight ? { maxHeight } : {}}>{json}</pre>;
}

function Badge({ status }) {
  const cls = status === 'PASS' || status === 'VALID' || status === 'ALLOWED'
    ? 'badge-pass'
    : status === 'SKIPPED' ? 'badge-skip' : 'badge-fail';
  return <span className={`badge ${cls}`}>{status}</span>;
}

// ── Tab 1: Delegation Flow ──
function DelegationTab({ tools: TOOLS }) {
  const [bits, setBits] = useState([0]); // READ_DATA by default
  const [credential, setCredential] = useState(null);
  const [keyData, setKeyData] = useState(null);
  const [supported, setSupported] = useState(true);
  const [selectedTool, setSelectedTool] = useState(TOOLS[0]?.name ?? 'get_portfolio');
  const [amount, setAmount] = useState('50');
  const [result, setResult] = useState(null);

  useEffect(() => {
    generateEd25519Keypair().then(kp => {
      if (!kp) setSupported(false);
      else setKeyData(kp);
    });
  }, []);

  function toggleBit(bit) {
    let next;
    if (bits.includes(bit)) {
      next = bits.filter(b => b !== bit);
      // Remove dependents: if unchecking bit 2, also remove 3 and 4
      if (bit === 2) next = next.filter(b => b !== 3 && b !== 4);
      if (bit === 3) next = next.filter(b => b !== 4);
    } else {
      next = [...bits, bit];
    }
    setBits(enforceCumulative(next));
  }

  async function issueCredential() {
    if (!keyData) return;
    const now = Date.now();
    const payload = {
      type: 'BolyraAgentCredential',
      version: '0.7.0',
      issuer: 'did:bolyra:' + keyData.publicKeyHex.slice(0, 40),
      subject: 'did:bolyra:agent:' + randomHex(16),
      modelHash: '0x' + randomHex(32),
      permissionBitmask: bitmaskFromBits(bits),
      permissions: bits.map(b => PERMISSIONS[b].name),
      amountCap: amountCap(bits),
      issuedAt: new Date(now).toISOString(),
      expiresAt: new Date(now + 86400000 * 365).toISOString(),
      nonce: randomHex(16),
    };
    const signature = await signEd25519(keyData.keyPair, payload);
    const cred = { payload, signature, signerPublicKey: keyData.publicKeyHex };
    setCredential(cred);
    setResult(null);
  }

  function testToolCall() {
    if (!credential) return;
    const tool = TOOLS.find(t => t.name === selectedTool);
    const credBits = bitsFromMask(credential.payload.permissionBitmask);
    const missing = tool.requiredBits.filter(b => !credBits.includes(b));

    if (missing.length > 0) {
      const missingNames = missing.map(b => PERMISSIONS[b].name).join(', ');
      setResult({ allowed: false, reason: 'scope_insufficient', detail: `Missing: ${missingNames}` });
      return;
    }

    if (tool.financial) {
      const amt = parseFloat(amount) || 0;
      const cap = credential.payload.amountCap;
      if (cap === 'None') {
        setResult({ allowed: false, reason: 'no_financial_permission', detail: 'Credential has no financial permissions' });
        return;
      }
      if (cap === '$100' && amt > 100) {
        setResult({ allowed: false, reason: 'amount_exceeds_cap', detail: `$${amt} exceeds FINANCIAL_SMALL cap of $100` });
        return;
      }
      if (cap === '$10,000' && amt > 10000) {
        setResult({ allowed: false, reason: 'amount_exceeds_cap', detail: `$${amt} exceeds FINANCIAL_MEDIUM cap of $10,000` });
        return;
      }
    }

    setResult({
      allowed: true,
      reason: 'authorized',
      detail: `Tool "${tool.name}" authorized with bitmask 0x${credential.payload.permissionBitmask.toString(16).padStart(2, '0')}`,
      receipt: {
        type: 'BolyraDecisionReceipt',
        decision: 'ALLOW',
        toolName: tool.name,
        credentialSubject: credential.payload.subject,
        permissionBitmask: credential.payload.permissionBitmask,
        timestamp: new Date().toISOString(),
        nonce: randomHex(16),
        signature: '0x' + randomHex(64),
        signer: randomAddress(),
      }
    });
  }

  if (!supported) {
    return (
      <div className="card">
        <h3>Browser Not Supported</h3>
        <p style={{ color: 'var(--red)' }}>Your browser does not support Ed25519 via Web Crypto.
        Please use Chrome 113+, Firefox 130+, or Safari 17+.</p>
      </div>
    );
  }

  return (
    <div>
      <div className="two-col">
        <div className="card">
          <h3>Issue Credential</h3>
          <div className="perm-grid">
            {PERMISSIONS.map(p => (
              <label key={p.bit} className="perm-item">
                <input type="checkbox" checked={bits.includes(p.bit)}
                  onChange={() => toggleBit(p.bit)} />
                <span>{p.label}</span>
                <span className="bit">bit {p.bit}</span>
              </label>
            ))}
          </div>
          <div style={{ fontSize: '0.82rem', color: 'var(--text-muted)', marginBottom: 12 }}>
            Amount cap: <strong style={{ color: 'var(--text)' }}>{amountCap(bits)}</strong>
            {' '} | Bitmask: <code>0x{bitmaskFromBits(bits).toString(16).padStart(2, '0')}</code>
          </div>
          <button className="btn btn-primary" onClick={issueCredential}
            disabled={!keyData}>Issue Credential</button>
        </div>

        <div className="card">
          <h3>Test Tool Call</h3>
          <div className="field">
            <label>Tool</label>
            <select value={selectedTool} onChange={e => setSelectedTool(e.target.value)}>
              {TOOLS.map(t => <option key={t.name} value={t.name}>{t.label}</option>)}
            </select>
          </div>
          {TOOLS.find(t => t.name === selectedTool)?.financial && (
            <div className="field">
              <label>Amount ($)</label>
              <input type="number" value={amount} onChange={e => setAmount(e.target.value)}
                min="0" step="1" />
            </div>
          )}
          <button className="btn btn-primary" onClick={testToolCall}
            disabled={!credential}>Send Request</button>
          {!credential && (
            <p style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: 8 }}>
              Issue a credential first.</p>
          )}
        </div>
      </div>

      {result && (
        <div className={`result-box ${result.allowed ? 'allowed' : 'denied'}`}>
          {result.allowed ? 'ALLOWED' : 'REJECTED'}
          <div className="reason">{result.reason}: {result.detail}</div>
        </div>
      )}

      {credential && (
        <div className="card">
          <h3>Credential JSON</h3>
          <CodeBlock data={credential} />
        </div>
      )}

      {result?.receipt && (
        <div className="card">
          <h3>Decision Receipt</h3>
          <CodeBlock data={result.receipt} />
        </div>
      )}
    </div>
  );
}

// ── Tab 2: Gateway Simulation ──
function GatewayTab({ onReceiptGenerated, preset }) {
  const TOOLS = preset.tools;
  const readTool = TOOLS.find(t => !t.financial)?.name ?? TOOLS[0]?.name;
  const financialTool = TOOLS.find(t => t.financial)?.name ?? TOOLS[1]?.name;
  // For "Valid Agent", use enough bits to cover the first tool's requirements
  const firstTool = TOOLS[0];
  const validBits = firstTool?.requiredBits ?? [0, 1];
  const validTool = firstTool?.name ?? readTool;
  // For denied scenario, pick a tool that needs higher bits than READ_DATA
  const deniedTool = TOOLS.find(t => t.financial && t.requiredBits.some(b => b > 1))?.name ?? financialTool;

  const SCENARIOS = [
    { name: 'Valid Agent', desc: `Valid credential, ${validTool}, passes all 4 steps`,
      credential: { valid: true, expired: false, permBits: validBits, tool: validTool } },
    { name: 'Expired Credential', desc: 'Credential expired yesterday',
      credential: { valid: true, expired: true, permBits: validBits, tool: validTool } },
    { name: 'Insufficient Permissions', desc: `READ_DATA only, but ${deniedTool} requires more`,
      credential: { valid: true, expired: false, permBits: [0], tool: deniedTool } },
    { name: 'Replay Attack', desc: 'Same nonce used twice -- click twice to see',
      credential: { valid: true, expired: false, permBits: validBits, tool: validTool, fixedNonce: true } },
  ];
  const [steps, setSteps] = useState([null, null, null, null]);
  const [running, setRunning] = useState(false);
  const [selectedScenario, setSelectedScenario] = useState(null);
  const [receipt, setReceipt] = useState(null);
  const [httpStatus, setHttpStatus] = useState(null);
  const nonceStoreRef = useRef(new Set());

  const STEP_NAMES = [
    'Credential Check',
    'Tool Policy',
    'Replay Protection',
    'Receipt Issuance',
  ];

  async function runPipeline(scenario) {
    setRunning(true);
    setReceipt(null);
    setHttpStatus(null);
    setSteps([null, null, null, null]);
    const s = scenario.credential;
    const nonce = s.fixedNonce ? 'fixed-replay-nonce-0001' : randomHex(16);

    await new Promise(r => setTimeout(r, 400));

    // Step 1: Credential check
    if (s.expired) {
      setSteps(['fail', 'skip', 'skip', 'skip']);
      setHttpStatus(401);
      setRunning(false);
      return;
    }
    setSteps(['pass', null, null, null]);
    await new Promise(r => setTimeout(r, 500));

    // Step 2: Tool policy
    const tool = TOOLS.find(t => t.name === s.tool);
    const hasPerm = tool.requiredBits.every(b => s.permBits.includes(b));
    if (!hasPerm) {
      setSteps(prev => ['pass', 'fail', 'skip', 'skip']);
      setHttpStatus(403);
      setRunning(false);
      return;
    }
    setSteps(prev => ['pass', 'pass', null, null]);
    await new Promise(r => setTimeout(r, 500));

    // Step 3: Replay protection
    if (nonceStoreRef.current.has(nonce)) {
      setSteps(prev => ['pass', 'pass', 'fail', 'skip']);
      setHttpStatus(403);
      setRunning(false);
      return;
    }
    nonceStoreRef.current.add(nonce);
    setSteps(prev => ['pass', 'pass', 'pass', null]);
    await new Promise(r => setTimeout(r, 500));

    // Step 4: Receipt issuance
    const rec = {
      type: 'BolyraSignedReceipt',
      version: '0.7.0',
      payload: {
        decision: 'ALLOW',
        toolName: s.tool,
        subject: 'did:bolyra:agent:' + randomHex(16),
        permissionBitmask: bitmaskFromBits(s.permBits),
        nonce: nonce,
        issuedAt: new Date().toISOString(),
        gatewayId: 'gateway-demo-' + randomHex(4),
      },
      signature: {
        algorithm: 'secp256k1-keccak256',
        value: '0x' + randomHex(64),
        payloadHash: '0x' + randomHex(32),
        signer: randomAddress(),
      },
    };
    setSteps(['pass', 'pass', 'pass', 'pass']);
    setHttpStatus(200);
    setReceipt(rec);
    if (onReceiptGenerated) onReceiptGenerated(rec);
    setRunning(false);
  }

  return (
    <div>
      <p style={{color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: '16px'}}>{preset.description} Each scenario shows the 4-step auth pipeline: credential check, tool policy, replay protection, receipt issuance.</p>
      <div className="card">
        <h3>Select Scenario</h3>
        <div className="scenarios">
          {SCENARIOS.map((sc, i) => (
            <button key={i}
              className={`btn ${selectedScenario === i ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => { setSelectedScenario(i); runPipeline(sc); }}
              disabled={running}>
              {sc.name}
            </button>
          ))}
        </div>
        {selectedScenario !== null && (
          <p style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>
            {SCENARIOS[selectedScenario].desc}
          </p>
        )}
      </div>

      <div className="card">
        <h3>4-Step Gateway Pipeline</h3>
        <div className="pipeline">
          {STEP_NAMES.map((name, i) => {
            const st = steps[i];
            const cls = st === 'pass' ? 'pass' : st === 'fail' ? 'fail' : st === 'skip' ? 'skip' : '';
            const icon = st === 'pass' ? '\u2713' : st === 'fail' ? '\u2717' : st === 'skip' ? '-' : '\u00B7';
            const detail = st === 'pass' ? 'Passed'
              : st === 'fail' && i === 0 ? 'Credential expired'
              : st === 'fail' && i === 1 ? 'Insufficient permissions'
              : st === 'fail' && i === 2 ? 'Nonce already used (replay detected)'
              : st === 'skip' ? 'Skipped' : 'Waiting...';
            return (
              <div key={i} className={`step ${cls}`}>
                <div className="icon">{icon}</div>
                <div className="info">
                  <div className="name">{i + 1}. {name}</div>
                  <div className="detail">{detail}</div>
                </div>
                {st && st !== 'skip' && <Badge status={st === 'pass' ? 'PASS' : 'FAIL'} />}
              </div>
            );
          })}
        </div>

        {httpStatus && (
          <div className={`result-box ${httpStatus === 200 ? 'allowed' : 'denied'}`}>
            HTTP {httpStatus} {httpStatus === 200 ? 'OK' : httpStatus === 401 ? 'Unauthorized' : 'Forbidden'}
          </div>
        )}
      </div>

      {receipt && (
        <div className="card">
          <h3>Generated Receipt</h3>
          <CodeBlock data={receipt} />
        </div>
      )}
    </div>
  );
}

// ── Tab 3: Receipt Inspector ──
const SAMPLE_RECEIPT = JSON.stringify({
  type: 'BolyraSignedReceipt', version: '0.7.0',
  payload: { decision: 'ALLOW', toolName: 'get_portfolio', subject: 'did:bolyra:agent:a1b2c3d4e5f6',
    permissionBitmask: 3, nonce: 'sample-nonce-00ff', issuedAt: new Date().toISOString(), gatewayId: 'gateway-demo-abcd' },
  signature: { algorithm: 'secp256k1-keccak256', value: '0x' + '4f'.repeat(64),
    payloadHash: '0x' + 'ab'.repeat(32), signer: '0x' + 'cd'.repeat(20) },
}, null, 2);

function InspectorTab({ lastReceipt }) {
  const [input, setInput] = useState('');
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (lastReceipt) {
      setInput(JSON.stringify(lastReceipt, null, 2));
    } else {
      setInput(SAMPLE_RECEIPT);
    }
  }, [lastReceipt]);

  function verify() {
    setError(null);
    setParsed(null);
    try {
      const obj = JSON.parse(input);
      if (!obj.payload || !obj.signature) {
        setError('Missing required fields: payload, signature');
        return;
      }

      const p = obj.payload;
      const s = obj.signature;

      // Parse permission bits
      const permBits = bitsFromMask(p.permissionBitmask || 0);
      const permNames = permBits.map(b => PERMISSIONS[b]?.name || `BIT_${b}`);

      // Mock signature verification -- in production this would use secp256k1 recovery
      // We check structural validity and format
      const sigValid = s.value && s.value.startsWith('0x') && s.value.length === 130;
      const hashValid = s.payloadHash && s.payloadHash.startsWith('0x') && s.payloadHash.length === 66;
      const signerValid = s.signer && s.signer.startsWith('0x') && s.signer.length === 42;

      setParsed({
        decision: p.decision || 'UNKNOWN',
        toolName: p.toolName || 'N/A',
        subject: p.subject || 'N/A',
        timestamp: p.issuedAt || 'N/A',
        nonce: p.nonce || 'N/A',
        gatewayId: p.gatewayId || 'N/A',
        permissionBitmask: p.permissionBitmask,
        permissionNames: permNames,
        signer: s.signer || 'N/A',
        algorithm: s.algorithm || 'N/A',
        payloadHash: s.payloadHash || 'N/A',
        signatureValid: sigValid && hashValid && signerValid,
        checks: {
          signatureFormat: sigValid ? 'VALID' : 'INVALID',
          payloadHashFormat: hashValid ? 'VALID' : 'INVALID',
          signerFormat: signerValid ? 'VALID' : 'INVALID',
        },
      });
    } catch (e) {
      setError('PARSE_ERROR: ' + e.message);
    }
  }

  return (
    <div>
      <div className="card">
        <h3>Paste Receipt JSON</h3>
        <div className="field">
          <textarea value={input} onChange={e => setInput(e.target.value)}
            rows={10} placeholder="Paste a BolyraSignedReceipt JSON here..." />
        </div>
        <button className="btn btn-primary" onClick={verify}>Verify</button>
        {lastReceipt && (
          <button className="btn btn-secondary" style={{ marginLeft: 8 }}
            onClick={() => setInput(JSON.stringify(lastReceipt, null, 2))}>
            Load from Gateway tab
          </button>
        )}
      </div>

      {error && (
        <div className="result-box denied">
          {error}
        </div>
      )}

      {parsed && (
        <div>
          <div className="card">
            <h3>Signature Status</h3>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <Badge status={parsed.signatureValid ? 'VALID' : 'INVALID'} />
              <span style={{ fontSize: '0.85rem' }}>
                {parsed.signatureValid
                  ? 'Signature, payload hash, and signer address are well-formed'
                  : 'One or more signature fields are malformed'}
              </span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
              {Object.entries(parsed.checks).map(([k, v]) => (
                <div key={k} style={{ fontSize: '0.75rem' }}>
                  <span style={{ color: 'var(--text-muted)' }}>{k}: </span>
                  <Badge status={v} />
                </div>
              ))}
            </div>
          </div>

          <div className="two-col">
            <div className="card">
              <h3>Payload</h3>
              <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                <tbody>
                  {[
                    ['Decision', parsed.decision],
                    ['Tool', parsed.toolName],
                    ['Subject', parsed.subject],
                    ['Nonce', parsed.nonce],
                    ['Gateway', parsed.gatewayId],
                    ['Timestamp', parsed.timestamp],
                    ['Bitmask', `0x${(parsed.permissionBitmask || 0).toString(16).padStart(2, '0')}`],
                  ].map(([label, val]) => (
                    <tr key={label} style={{ borderBottom: '1px solid var(--border)' }}>
                      <td style={{ padding: '6px 8px', color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>{label}</td>
                      <td className="mono" style={{ padding: '6px 8px', wordBreak: 'break-all' }}>{val}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="card">
              <h3>Permissions</h3>
              <div className="perm-grid">
                {PERMISSIONS.map(p => (
                  <div key={p.bit} className="perm-item" style={{
                    opacity: parsed.permissionNames.includes(p.name) ? 1 : 0.3
                  }}>
                    <span style={{
                      width: 12, height: 12, borderRadius: 3, display: 'inline-block',
                      background: parsed.permissionNames.includes(p.name) ? 'var(--green)' : 'var(--border)',
                    }}></span>
                    <span>{p.label}</span>
                    <span className="bit">bit {p.bit}</span>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 12 }}>
                <p style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>Signer</p>
                <p className="mono" style={{ fontSize: '0.75rem', wordBreak: 'break-all' }}>{parsed.signer}</p>
              </div>
              <div style={{ marginTop: 8 }}>
                <p style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>Algorithm</p>
                <p className="mono" style={{ fontSize: '0.75rem' }}>{parsed.algorithm}</p>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Tab 4: Base Wallet ──
const BASE_WALLET_POLICY = {
  maxPerRequest: 2.00,
  dailyCap: 2.00,
  allowedAssets: ['USDC'],
  allowedNetworks: ['base-sepolia'],
  agentDid: 'did:bolyra:base-sepolia:0x742d...bDe7',
  permissions: ['READ_DATA', 'FINANCIAL_SMALL'],
};

const BASE_WALLET_SCENARIOS = [
  { id: 1, request: 'NVDA research',  amount: 0.50, allowed: true },
  { id: 2, request: 'BTC summary',    amount: 0.25, allowed: true },
  { id: 3, request: 'GPU inference',  amount: 1.00, allowed: true },
  { id: 4, request: 'Premium report', amount: 5.00, allowed: false, reason: 'exceeds $2.00/request cap' },
  { id: 5, request: 'Market feed',    amount: 0.10, allowed: true },
  { id: 6, request: 'More research',  amount: 0.50, allowed: false, reason: 'daily cap exceeded' },
];

function BaseWalletTab() {
  const [rows, setRows] = useState(BASE_WALLET_SCENARIOS.map(() => null)); // null = pending
  const [running, setRunning] = useState(false);
  const [dailySpent, setDailySpent] = useState(0);
  const [receipts, setReceipts] = useState([]);

  function makeReceipt(sc, decision, spent) {
    return {
      type: 'BolyraWalletReceipt',
      version: '0.7.0',
      payload: {
        decision,
        request: sc.request,
        amount: `$${sc.amount.toFixed(2)}`,
        asset: 'USDC',
        network: 'base-sepolia',
        dailySpent: `$${spent.toFixed(2)}`,
        dailyRemaining: `$${Math.max(0, BASE_WALLET_POLICY.dailyCap - spent).toFixed(2)}`,
        agent: BASE_WALLET_POLICY.agentDid,
        timestamp: new Date().toISOString(),
        nonce: randomHex(16),
      },
      signature: {
        algorithm: 'secp256k1-keccak256',
        value: '0x' + randomHex(64),
        signer: randomAddress(),
      },
    };
  }

  async function runDemo() {
    setRunning(true);
    setRows(BASE_WALLET_SCENARIOS.map(() => null));
    setReceipts([]);
    let spent = 0;

    for (let i = 0; i < BASE_WALLET_SCENARIOS.length; i++) {
      await new Promise(r => setTimeout(r, 500));
      const sc = BASE_WALLET_SCENARIOS[i];
      let result;

      if (sc.amount > BASE_WALLET_POLICY.maxPerRequest) {
        // Exceeds per-request cap
        result = { allowed: false, reason: sc.reason };
      } else if (spent + sc.amount > BASE_WALLET_POLICY.dailyCap) {
        // Exceeds daily cap
        result = { allowed: false, reason: sc.reason };
      } else {
        spent += sc.amount;
        result = { allowed: true };
      }

      const receipt = makeReceipt(sc, result.allowed ? 'ALLOW' : 'DENY', spent);
      if (!result.allowed) {
        receipt.payload.denyReason = result.reason;
      }

      setRows(prev => {
        const next = [...prev];
        next[i] = result;
        return next;
      });
      setDailySpent(spent);
      setReceipts(prev => [...prev, receipt]);
    }

    setRunning(false);
  }

  function reset() {
    setRows(BASE_WALLET_SCENARIOS.map(() => null));
    setDailySpent(0);
    setReceipts([]);
  }

  const completedCount = rows.filter(r => r !== null).length;

  return (
    <div>
      <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: 16 }}>
        Simulates a human-gated agent wallet on Base. The human sets spending limits; the agent auto-pays
        x402 API requests within policy. No server calls -- pure client-side simulation.
      </p>

      {/* Policy Card */}
      <div className="card">
        <h3>Delegation Policy</h3>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 24px', fontSize: '0.85rem' }}>
          <div>
            <span style={{ color: 'var(--text-muted)' }}>Max per request: </span>
            <strong style={{ color: 'var(--green)' }}>${BASE_WALLET_POLICY.maxPerRequest.toFixed(2)}</strong>
          </div>
          <div>
            <span style={{ color: 'var(--text-muted)' }}>Daily cap: </span>
            <strong style={{ color: 'var(--green)' }}>${BASE_WALLET_POLICY.dailyCap.toFixed(2)}</strong>
          </div>
          <div>
            <span style={{ color: 'var(--text-muted)' }}>Allowed assets: </span>
            <code>{BASE_WALLET_POLICY.allowedAssets.join(', ')}</code>
          </div>
          <div>
            <span style={{ color: 'var(--text-muted)' }}>Allowed networks: </span>
            <code>{BASE_WALLET_POLICY.allowedNetworks.join(', ')}</code>
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <span style={{ color: 'var(--text-muted)' }}>Agent DID: </span>
            <code style={{ fontSize: '0.8rem' }}>{BASE_WALLET_POLICY.agentDid}</code>
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <span style={{ color: 'var(--text-muted)' }}>Permissions: </span>
            {BASE_WALLET_POLICY.permissions.map(p => (
              <span key={p} className="badge badge-pass" style={{ marginRight: 6 }}>{p}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Transaction Table */}
      <div className="card">
        <h3>Transaction Simulation</h3>
        <table style={{ width: '100%', fontSize: '0.82rem', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              <th style={{ padding: '8px', textAlign: 'left', color: 'var(--text-muted)', fontWeight: 600 }}>#</th>
              <th style={{ padding: '8px', textAlign: 'left', color: 'var(--text-muted)', fontWeight: 600 }}>Request</th>
              <th style={{ padding: '8px', textAlign: 'right', color: 'var(--text-muted)', fontWeight: 600 }}>Amount</th>
              <th style={{ padding: '8px', textAlign: 'center', color: 'var(--text-muted)', fontWeight: 600 }}>Result</th>
            </tr>
          </thead>
          <tbody>
            {BASE_WALLET_SCENARIOS.map((sc, i) => {
              const result = rows[i];
              const isPending = result === null;
              const isAllow = result?.allowed;
              const rowBg = isPending ? 'transparent'
                : isAllow ? 'rgba(74,222,128,0.05)' : 'rgba(248,113,113,0.05)';
              const rowBorder = isPending ? 'var(--border)'
                : isAllow ? 'rgba(74,222,128,0.2)' : 'rgba(248,113,113,0.2)';

              return (
                <tr key={sc.id} style={{
                  borderBottom: `1px solid ${rowBorder}`,
                  background: rowBg,
                  opacity: isPending ? 0.35 : 1,
                  transition: 'all 0.4s ease',
                }}>
                  <td style={{ padding: '10px 8px' }} className="mono">{sc.id}</td>
                  <td style={{ padding: '10px 8px' }}>{sc.request}</td>
                  <td style={{ padding: '10px 8px', textAlign: 'right' }} className="mono">
                    ${sc.amount.toFixed(2)}
                  </td>
                  <td style={{ padding: '10px 8px', textAlign: 'center' }}>
                    {isPending ? (
                      <span className="badge badge-skip">PENDING</span>
                    ) : isAllow ? (
                      <span className="badge badge-pass">ALLOW</span>
                    ) : (
                      <span>
                        <span className="badge badge-fail">DENY</span>
                        <span style={{ display: 'block', fontSize: '0.7rem', color: 'var(--red)', marginTop: 2 }}>
                          {result.reason}
                        </span>
                      </span>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>

        {/* Running total */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', padding: '12px 8px 4px',
          fontSize: '0.82rem', borderTop: '1px solid var(--border)', marginTop: 4,
        }}>
          <span style={{ color: 'var(--text-muted)' }}>
            Daily spent: <strong className="mono" style={{ color: 'var(--text)' }}>
              ${dailySpent.toFixed(2)}
            </strong>
          </span>
          <span style={{ color: 'var(--text-muted)' }}>
            Remaining: <strong className="mono" style={{
              color: BASE_WALLET_POLICY.dailyCap - dailySpent <= 0 ? 'var(--red)' : 'var(--green)'
            }}>
              ${Math.max(0, BASE_WALLET_POLICY.dailyCap - dailySpent).toFixed(2)}
            </strong>
          </span>
        </div>
      </div>

      {/* Controls */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        <button className="btn btn-primary" onClick={runDemo}
          disabled={running || completedCount === BASE_WALLET_SCENARIOS.length}>
          {running ? 'Running...' : completedCount > 0 ? 'Demo Complete' : 'Run Demo'}
        </button>
        {completedCount > 0 && !running && (
          <button className="btn btn-secondary" onClick={reset}>Reset</button>
        )}
      </div>

      {/* Receipt Feed */}
      {receipts.length > 0 && (
        <div className="card">
          <h3>Receipt Feed</h3>
          <div style={{
            maxHeight: 300, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 8,
          }}>
            {receipts.map((r, i) => (
              <div key={i} style={{
                background: 'var(--bg-code)', border: '1px solid var(--border)',
                borderRadius: 6, padding: 10, borderLeft: `3px solid ${r.payload.decision === 'ALLOW' ? 'var(--green)' : 'var(--red)'}`,
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, fontSize: '0.75rem' }}>
                  <span style={{ fontWeight: 600 }}>#{i + 1} {r.payload.request}</span>
                  <Badge status={r.payload.decision === 'ALLOW' ? 'ALLOWED' : 'FAIL'} />
                </div>
                <pre className="mono" style={{
                  fontSize: '0.7rem', color: 'var(--text-muted)', whiteSpace: 'pre-wrap',
                  wordBreak: 'break-all', margin: 0, lineHeight: 1.4,
                }}>{JSON.stringify(r, null, 2)}</pre>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ──

  const [tab, setTab] = useState(0);
  const [lastReceipt, setLastReceipt] = useState(null);
  const [demoPreset, setDemoPreset] = useState('autonomous');

  const tabs = ['Delegation Flow', 'Gateway Simulation', 'Receipt Inspector', 'Base Wallet'];
  const preset = DEMO_PRESETS[demoPreset];

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {Object.entries(DEMO_PRESETS).map(([key, p]) => (
          <button key={key}

            style={{
              padding: '8px 16px',
              borderRadius: 8,
              border: demoPreset === key ? '2px solid var(--accent)' : '1px solid var(--border)',
              background: demoPreset === key ? 'rgba(99,102,241,0.15)' : 'var(--bg-elevated)',
              color: demoPreset === key ? 'var(--accent)' : 'var(--text-muted)',
              cursor: 'pointer',
              fontWeight: demoPreset === key ? 700 : 400,
              fontSize: '0.85rem',
            }}>{p.label}</button>
        ))}
      </div>

      <div className="tab-bar">
        {tabs.map((t, i) => (
          <button key={i} className={`tab-btn ${tab === i ? 'active' : ''}`}
            onClick={() => setTab(i)}>{t}</button>
        ))}
      </div>

      {tab === 0 && <DelegationTab key={demoPreset} tools={preset.tools} />}
      {tab === 1 && <GatewayTab key={demoPreset} onReceiptGenerated={setLastReceipt} preset={preset} />}

        Cryptographic operations use Web Crypto API (Ed25519) and mock signatures.

        {' '}<a href="https://github.com/bolyra/bolyra">View source on GitHub</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
