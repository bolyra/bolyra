<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolyra — Off-Chain Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0c10; overflow: hidden; }
  #video-root { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="video-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="system.jsx"></script>
<script type="text/babel" src="scenes_offchain.jsx"></script>

<script type="text/babel">
const DURATION = 30;

function TimecodeTag() {
  const time = useTime();
  React.useEffect(() => {
    const el = document.getElementById('video-root');
    if (el) el.setAttribute('data-screen-label', 't=' + time.toFixed(0) + 's');
  }, [Math.floor(time)]);
  return null;
}

function Video() {
  return (
    <Stage width={1920} height={1080} duration={DURATION} background="#0a0c10" persistKey="bolyra-offchain">
      <Backdrop glowX={962} glowY={540} />
      <TimecodeTag />

      <Sprite start={0} end={5.0}>{({ localTime }) => <OcProblem t={localTime} dur={5.0} />}</Sprite>
      <Sprite start={4.9} end={11.0}>{({ localTime }) => <OcLocal t={localTime} dur={6.1} />}</Sprite>
      <Sprite start={10.8} end={18.4}>{({ localTime }) => <OcBatch t={localTime} dur={7.6} />}</Sprite>
      <Sprite start={18.2} end={24.2}>{({ localTime }) => <OcStat t={localTime} dur={6.0} />}</Sprite>
      <Sprite start={24.0} end={30}>{({ localTime }) => <OcCTA t={localTime} dur={6.0} />}</Sprite>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('video-root')).render(<Video />);
</script>
</body>
</html>
