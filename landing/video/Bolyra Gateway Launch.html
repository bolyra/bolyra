<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolyra Gateway — Launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0c10; overflow: hidden; }
  #video-root { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="video-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="system.jsx"></script>
<script type="text/babel" src="scenes_hero.jsx"></script>
<script type="text/babel" src="scenes_more.jsx"></script>

<script type="text/babel">
const DURATION = 31;

function TimecodeTag() {
  const time = useTime();
  React.useEffect(() => {
    const el = document.getElementById('video-root');
    if (el) el.setAttribute('data-screen-label', 't=' + time.toFixed(0) + 's');
  }, [Math.floor(time)]);
  return null;
}

function Cap(props) {
  return (
    <Sprite start={props.start} end={props.end}>
      {({ localTime }) => (
        <Caption t={localTime} dur={props.end - props.start} y={104}
          kicker={props.kicker} title={props.title} sub={props.sub} />
      )}
    </Sprite>
  );
}

function Video() {
  return (
    <Stage width={1920} height={1080} duration={DURATION} background="#0a0c10" persistKey="bolyra-gw">
      <Backdrop glowX={962} glowY={540} />
      <TimecodeTag />

      {/* ── Hero diagram: problem -> gate drop-in + command -> verify/reject ── */}
      <Sprite start={0} end={18.4}>
        {({ localTime }) => (
          <React.Fragment>
            <HeroDiagram t={localTime} />
            <TerminalCommand t={localTime} start={6.8} />
          </React.Fragment>
        )}
      </Sprite>

      {/* hero top captions */}
      <Cap start={0.8} end={4.9} kicker="THE PROBLEM" title="Any agent can call any tool." sub="MCP servers trust every caller." />
      <Cap start={6.3} end={9.9} kicker="ONE COMMAND" title="Put a gate in front of any MCP server." />
      <Cap start={10.4} end={17.9} kicker="EVERY CALL, CHECKED" title="Credentials verified. Replays rejected." />

      {/* ── Receipts ── */}
      <Sprite start={18.0} end={22.9}>
        {({ localTime }) => <ReceiptsScene t={localTime} dur={4.9} />}
      </Sprite>

      {/* ── v0.2.0 Redis ── */}
      <Sprite start={22.7} end={27.5}>
        {({ localTime }) => <RedisScene t={localTime} dur={4.8} />}
      </Sprite>

      {/* ── CTA ── */}
      <Sprite start={27.3} end={31}>
        {({ localTime }) => <CTAScene t={localTime} dur={3.7} />}
      </Sprite>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('video-root')).render(<Video />);
</script>
</body>
</html>
