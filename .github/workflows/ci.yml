name: Bolyra CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Circuit compilation (circom) and contract tests (hardhat) are skipped
# in CI. Circuit compilation requires large Powers of Tau (.ptau) files and a
# circom binary that are impractical to install in GitHub Actions runners.
# Contract tests depend on compiled circuit artifacts (verifier contracts).
# Run these locally: `npm run test:circuits:fast` and `npm run test:contracts`.

jobs:
  sdk-tests:
    name: SDK — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  openclaw-tests:
    name: OpenClaw integration — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: integrations/openclaw/package-lock.json

      - run: npm ci

      # The openclaw package has a peer dep on @bolyra/sdk — install it from
      # the local workspace so tests can resolve it.
      - name: Link local @bolyra/sdk
        run: |
          cd ../../sdk && npm ci && npm link
          cd ../../integrations/openclaw && npm link @bolyra/sdk

      - run: npx tsc --noEmit
      - run: npm test

  conformance:
    name: Conformance test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: circuits/package-lock.json

      # The conformance runner imports circomlibjs from circuits/node_modules
      - name: Install circuit dependencies (no compile)
        run: cd circuits && npm ci

      - run: node spec/conformance-runner.js

  typecheck-all:
    name: Typecheck — all TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Typecheck sdk
        run: cd sdk && npm ci && npx tsc --noEmit

      - name: Typecheck integrations/openclaw
        run: |
          cd sdk && npm link
          cd ../integrations/openclaw && npm ci && npm link @bolyra/sdk && npx tsc --noEmit
