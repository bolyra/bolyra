name: Bolyra CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Circuit compilation (circom) and contract tests (hardhat) are skipped
# in CI. Circuit compilation requires large Powers of Tau (.ptau) files and a
# circom binary that are impractical to install in GitHub Actions runners.
# Contract tests depend on compiled circuit artifacts (verifier contracts).
# Run these locally: `npm run test:circuits:fast` and `npm run test:contracts`.

jobs:
  sdk-tests:
    name: SDK — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  openclaw-tests:
    name: OpenClaw integration — typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # The integration's package.json pins @bolyra/sdk ^0.3.0 for publish-
      # correctness, but during a release cohort the new SDK version isn't on
      # npm yet, so `npm ci` would fail at registry resolution. Rewrite the
      # dep to file:../../sdk in-CI, drop the stale lockfile, and install.
      # This mutation is local to the runner — the committed package.json
      # ships unchanged.
      - name: Build local @bolyra/sdk
        run: |
          cd sdk
          npm ci
          npm run build

      - name: Install integration with file:// SDK
        working-directory: integrations/openclaw
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install

      - run: npx tsc --noEmit
        working-directory: integrations/openclaw
      - run: npm test
        working-directory: integrations/openclaw

  conformance:
    name: Conformance test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: circuits/package-lock.json

      # The conformance runner imports circomlibjs from circuits/node_modules
      - name: Install circuit dependencies (no compile)
        run: cd circuits && npm ci

      - run: node spec/conformance-runner.js

  typecheck-all:
    name: Typecheck — all TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Typecheck sdk
        run: cd sdk && npm ci && npx tsc --noEmit

      - name: Typecheck integrations/openclaw
        run: |
          cd sdk && npm run build
          cd ../integrations/openclaw
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install
          npx tsc --noEmit
