name: Bolyra CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Circuit compilation (circom) and contract tests (hardhat) are skipped
# in CI. Circuit compilation requires large Powers of Tau (.ptau) files and a
# circom binary that are impractical to install in GitHub Actions runners.
# Contract tests depend on compiled circuit artifacts (verifier contracts).
# Run these locally: `npm run test:circuits:fast` and `npm run test:contracts`.

jobs:
  sdk-tests:
    name: SDK — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  openclaw-tests:
    name: OpenClaw integration — typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # The integration's package.json pins @bolyra/sdk ^0.3.0 for publish-
      # correctness, but during a release cohort the new SDK version isn't on
      # npm yet, so `npm ci` would fail at registry resolution. Rewrite the
      # dep to file:../../sdk in-CI, drop the stale lockfile, and install.
      # This mutation is local to the runner — the committed package.json
      # ships unchanged.
      - name: Build local @bolyra/sdk
        run: |
          cd sdk
          npm ci
          npm run build

      - name: Install integration with file:// SDK
        working-directory: integrations/openclaw
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install

      - run: npx tsc --noEmit
        working-directory: integrations/openclaw
      - run: npm test
        working-directory: integrations/openclaw

  mcp-tests:
    name: MCP integration — typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build local @bolyra/sdk
        run: cd sdk && npm ci && npm run build

      - name: Build local @bolyra/receipts
        run: cd integrations/receipts && npm install && npm run build

      - name: Install MCP integration with file:// SDK + receipts
        working-directory: integrations/mcp
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';p.dependencies['@bolyra/receipts']='file:../receipts';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install

      - run: npx tsc --noEmit
        working-directory: integrations/mcp
      - run: npm test -- --testPathIgnorePatterns='e2e'
        working-directory: integrations/mcp

  payment-protocols-tests:
    name: Payment Protocols — typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build local @bolyra/sdk
        run: cd sdk && npm ci && npm run build

      - name: Install payment-protocols with file:// SDK
        working-directory: integrations/payment-protocols
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install

      - run: npx tsc --noEmit
        working-directory: integrations/payment-protocols
      - run: npm test
        working-directory: integrations/payment-protocols

  conformance:
    name: Conformance test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: circuits/package-lock.json

      # The conformance runner imports circomlibjs from circuits/node_modules
      - name: Install circuit dependencies (no compile)
        run: cd circuits && npm ci

      - run: node spec/conformance-runner.js

  typecheck-all:
    name: Typecheck — all TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Typecheck sdk
        run: cd sdk && npm ci && npx tsc --noEmit

      - name: Typecheck integrations/openclaw
        run: |
          cd sdk && npm run build
          cd ../integrations/openclaw
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install
          npx tsc --noEmit

      - name: Build local @bolyra/receipts (for MCP typecheck)
        run: cd integrations/receipts && npm install && npm run build

      - name: Typecheck integrations/mcp
        run: |
          cd integrations/mcp
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';p.dependencies['@bolyra/receipts']='file:../receipts';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install
          npx tsc --noEmit

      - name: Typecheck integrations/payment-protocols
        run: |
          cd integrations/payment-protocols
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install
          npx tsc --noEmit

  dependency-audit:
    name: Dependency audit — runtime deps only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # Audit each published package's runtime dependencies. We use
      # --omit=dev so we only gate on advisories reachable from shipped code;
      # dev-only advisories (Hardhat toolchain, circom_tester, etc.) are
      # tracked separately in SECURITY.md "Known accepted residual Dependabot
      # alerts". --audit-level=high means low/moderate are reported but do
      # not fail the build; high and critical fail.
      #
      # For the workspace packages that depend on file:../../sdk we still
      # need a built SDK on disk so npm install can resolve.
      - name: Build local @bolyra/sdk
        run: cd sdk && npm ci && npm run build

      - name: Audit @bolyra/sdk
        working-directory: sdk
        run: npm audit --omit=dev --audit-level=high

      - name: Audit @bolyra/mcp
        working-directory: integrations/mcp
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));if(p.dependencies&&p.dependencies['@bolyra/sdk'])p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install --package-lock-only
          npm audit --omit=dev --audit-level=high

      - name: Audit @bolyra/openclaw
        working-directory: integrations/openclaw
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));if(p.dependencies&&p.dependencies['@bolyra/sdk'])p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install --package-lock-only
          npm audit --omit=dev --audit-level=high

      - name: Audit @bolyra/payment-protocols
        working-directory: integrations/payment-protocols
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));if(p.dependencies&&p.dependencies['@bolyra/sdk'])p.dependencies['@bolyra/sdk']='file:../../sdk';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          rm -f package-lock.json
          npm install --package-lock-only
          npm audit --omit=dev --audit-level=high

  smoke-test:
    name: Smoke test — fresh install from npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Create temp project and install from npm
        run: |
          mkdir /tmp/bolyra-smoke
          cd /tmp/bolyra-smoke
          npm init -y
          npm install @bolyra/sdk @bolyra/receipts

      - uses: actions/checkout@v7.0.0
        with:
          sparse-checkout: .github/smoke-test.cjs
          path: repo

      - name: Run smoke test
        working-directory: /tmp/bolyra-smoke
        run: |
          cp $GITHUB_WORKSPACE/repo/.github/smoke-test.cjs ./smoke-test.cjs
          node smoke-test.cjs

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Python SDK smoke test
        run: |
          pip install bolyra
          python3 -c "
          from bolyra.types import HumanIdentity, AgentCredential, Permission
          from bolyra.identity import permissions_to_bitmask, validate_cumulative_bit_encoding
          bitmask = permissions_to_bitmask([Permission.READ_DATA, Permission.WRITE_DATA])
          validate_cumulative_bit_encoding(bitmask)
          print(f'✓ Python SDK: bitmask={bitmask}, types import OK')
          "
