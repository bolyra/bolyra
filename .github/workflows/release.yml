          if [ "$PJ_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: tag version ${{ steps.tag.outputs.version }} does not match pyproject.toml version $PJ_VERSION" >&2
            exit 1
          fi

      - name: Install build tools
        run: pip install build

      - name: Build
        working-directory: integrations/openai-agents
        run: python3 -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/openai-agents/dist/

      - name: Verify on PyPI
        run: |
          for i in 1 2 3 4 5 6; do
            FOUND=$(pip index versions bolyra-agents 2>/dev/null | grep -o "${{ steps.tag.outputs.version }}" || true)
            if [ -n "$FOUND" ]; then
              echo "✓ bolyra-agents==${{ steps.tag.outputs.version }} resolves on PyPI"
              exit 0
            fi
            echo "PyPI CDN lag (attempt $i/6) — sleeping 10s"
            sleep 10
          done
          echo "ERROR: published but not yet resolvable on PyPI" >&2
          exit 1

  # ── PyPI publish (CrewAI adapter) ───────────────────────────────
  # Trigger: push of tag matching bolyra-crewai@<version>
  # Auth: OIDC trusted publishing (no TWINE_PASSWORD / PYPI_TOKEN).
  # Requires Trusted Publisher on pypi.org:
  #   package=bolyra-crewai, owner=bolyra, repo=bolyra,
  #   workflow=release.yml, environment=pypi-publish
  publish-crewai:
    name: Publish bolyra-crewai (PyPI) ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/bolyra-crewai@')
