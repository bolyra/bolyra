name: Release

# Trusted-publishing workflow for the four @bolyra/* npm packages.
#
# Trigger: push of a per-package tag matching @bolyra/<pkg>@<version>.
# Cohort releases (v0.x.0) are out of scope here — they can be added once
# the cohort moves again. Per-package patches are the active pattern.
#
# Auth: no NPM_TOKEN. The job exchanges its GitHub Actions OIDC token for
# a short-lived npm publish credential, which requires a Trusted Publisher
# config on the npm package side (npmjs.com → package → Settings → Trusted
# Publisher → Add: GitHub Actions / org=bolyra / repo=bolyra / workflow=
# .github/workflows/release.yml / environment=npm-publish). Do this once
# per package before the first OIDC publish; otherwise npm publish 401s.
#
# Provenance: --provenance attaches a signed SLSA attestation to the
# tarball linking it back to this workflow run + the source commit.
# Consumers can verify via `npm audit signatures`.

on:
  push:
    tags:
      - '@bolyra/sdk@*'
      - '@bolyra/payment-protocols@*'
      - '@bolyra/mcp@*'
      - '@bolyra/openclaw@*'
      - '@bolyra/receipts@*'
      - '@bolyra/gateway@*'
      - '@bolyra/cli@*'
      - '@bolyra/circuits@*'
      - '@bolyra/ai@*'
      - 'bolyra-python@*'
      - 'bolyra-langchain@*'
      - 'bolyra-agents@*'
      - 'bolyra-crewai@*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/@bolyra/')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write    # required for npm trusted publishing
      contents: read

    steps:
      - name: Parse tag → package + version
        id: tag
        run: |
          # Tag shape: @bolyra/<pkg>@<version>
          REF="${GITHUB_REF#refs/tags/}"
          if [[ ! "$REF" =~ ^@bolyra/([a-z-]+)@(.+)$ ]]; then
            echo "ERROR: tag '$REF' does not match @bolyra/<pkg>@<version>" >&2
            exit 1
          fi
          PKG="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"

          case "$PKG" in
            sdk)                DIR=sdk ;;
            payment-protocols)  DIR=integrations/payment-protocols ;;
            mcp)                DIR=integrations/mcp ;;
            openclaw)           DIR=integrations/openclaw ;;
            receipts)           DIR=integrations/receipts ;;
            gateway)            DIR=integrations/gateway ;;
            cli)                DIR=integrations/cli ;;
            circuits)           DIR=circuits-package ;;
            ai)                 DIR=integrations/ai ;;
            *)                  echo "ERROR: unknown package '$PKG'" >&2; exit 1 ;;
          esac

          echo "pkg=$PKG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR"         >> "$GITHUB_OUTPUT"
          echo "Releasing @bolyra/$PKG@$VERSION from $DIR"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing requires npm >=11.5.1 (OIDC token exchange).
      # Node 22 ships npm 10.x which lacks this. Upgrade npm in-place.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Verify package.json version matches tag
        working-directory: ${{ steps.tag.outputs.dir }}
        run: |
          PJ_VERSION=$(node -p "require('./package.json').version")
          if [ "$PJ_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: tag version ${{ steps.tag.outputs.version }} does not match package.json version $PJ_VERSION" >&2
            exit 1
          fi

      - name: Install
        working-directory: ${{ steps.tag.outputs.dir }}
        # Use npm install (not ci) because npm 11+ is stricter about lockfile
        # compat with lockfiles generated by npm 10.x.
        run: npm install --no-audit --no-fund

      - name: Build (if build script exists)
        working-directory: ${{ steps.tag.outputs.dir }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            npm run build
          else
            echo "(no build script — skipping)"
          fi

      - name: Test (if test script exists)
        working-directory: ${{ steps.tag.outputs.dir }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            # Skip e2e, receipt-integration, proxy, and integration tests that need
            # a live upstream or monorepo context
            npm test -- --testPathIgnorePatterns='e2e|receipt-integration|proxy|integration'
          else
            echo "(no test script — skipping)"
          fi

      - name: Publish with provenance
        working-directory: ${{ steps.tag.outputs.dir }}
        run: npm publish --provenance --access public

      - name: Verify on registry
        run: |
          # Give npm CDN ~10s to surface the new version.
          for i in 1 2 3 4 5 6; do
            FOUND=$(npm view "@bolyra/${{ steps.tag.outputs.pkg }}@${{ steps.tag.outputs.version }}" version 2>/dev/null || true)
            if [ "$FOUND" = "${{ steps.tag.outputs.version }}" ]; then
              echo "✓ @bolyra/${{ steps.tag.outputs.pkg }}@${{ steps.tag.outputs.version }} resolves on registry"
              exit 0
            fi
            echo "registry CDN lag (attempt $i/6) — sleeping 5s"
            sleep 5
          done
          echo "ERROR: published but not yet resolvable on registry" >&2
          exit 1

  # ── PyPI publish (Python SDK) ──────────────────────────────────────
  # Trigger: push of tag matching bolyra-python@<version>
  # Auth: OIDC trusted publishing (no TWINE_PASSWORD / PYPI_TOKEN).
  # Requires Trusted Publisher on pypi.org:
  #   package=bolyra, owner=bolyra, repo=bolyra,
  #   workflow=release.yml, environment=pypi-publish
  publish-pypi:
    name: Publish bolyra (PyPI) ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/bolyra-python@')
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Parse tag → version
        id: tag
        run: |
          REF="${GITHUB_REF#refs/tags/bolyra-python@}"
          echo "version=$REF" >> "$GITHUB_OUTPUT"
          echo "Publishing bolyra==$REF to PyPI"

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify pyproject.toml version matches tag
        working-directory: sdk-python
        run: |
          PJ_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PJ_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: tag version ${{ steps.tag.outputs.version }} does not match pyproject.toml version $PJ_VERSION" >&2
            exit 1
          fi

      - name: Install build tools
        run: pip install build pytest

      - name: Build
        working-directory: sdk-python
        run: python3 -m build

      - name: Test (pure Python only — bridge tests need Node SDK built)
        working-directory: sdk-python
        run: |
          pip install dist/bolyra-*.whl
          python3 -m pytest tests/test_types.py tests/test_delegation.py -v

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk-python/dist/

      - name: Verify on PyPI
        run: |
          for i in 1 2 3 4 5 6; do
            FOUND=$(pip index versions bolyra 2>/dev/null | grep -o "${{ steps.tag.outputs.version }}" || true)
            if [ -n "$FOUND" ]; then
              echo "✓ bolyra==${{ steps.tag.outputs.version }} resolves on PyPI"
              exit 0
            fi
            echo "PyPI CDN lag (attempt $i/6) — sleeping 10s"
            sleep 10
          done
          echo "ERROR: published but not yet resolvable on PyPI" >&2
          exit 1

  # ── PyPI publish (LangChain adapter) ─────────────────────────────
  # Trigger: push of tag matching bolyra-langchain@<version>
  # Auth: OIDC trusted publishing (no TWINE_PASSWORD / PYPI_TOKEN).
  # Requires Trusted Publisher on pypi.org:
  #   package=bolyra-langchain, owner=bolyra, repo=bolyra,
  #   workflow=release.yml, environment=pypi-publish
  publish-langchain:
    name: Publish bolyra-langchain (PyPI) ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/bolyra-langchain@')
    runs-on: ubuntu-latest
