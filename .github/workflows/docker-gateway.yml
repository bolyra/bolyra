name: Docker Gateway

on:
  push:
    tags:
      - 'gateway-v*'
  pull_request:
    paths:
      - 'integrations/gateway/**'
      - 'Dockerfile.gateway'
      - '.github/workflows/docker-gateway.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/gateway-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/gateway-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v6.0.0
        with:
          context: .
          file: Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/bolyra/gateway:${{ steps.version.outputs.version }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'ghcr.io/bolyra/gateway:latest' || '' }}
          build-args: |
            GATEWAY_VERSION=${{ steps.version.outputs.version == 'dev' && 'latest' || steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GWVER="${VERSION:-latest}"
          [ "$GWVER" = "dev" ] && GWVER="latest"
          docker build -f Dockerfile.gateway \
            --build-arg GATEWAY_VERSION=$GWVER \
            -t bolyra-gateway-smoke .
          docker run --rm -d -p 4100:4100 --name gw-smoke \
            bolyra-gateway-smoke --target http://localhost:9999/mcp --dev
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4100/healthz || true)
          docker stop gw-smoke || true
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            echo "Smoke test failed: /healthz returned $STATUS (expected 200 or 503)"
            exit 1
          fi
          echo "Smoke test passed: /healthz returned $STATUS"
