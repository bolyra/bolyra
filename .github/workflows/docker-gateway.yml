name: Docker Gateway

on:
  push:
    tags:
      - 'gateway-v*'
  pull_request:
    paths:
      - 'integrations/gateway/**'
      - 'Dockerfile.gateway'
      - '.github/workflows/docker-gateway.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226  # v3.0.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d  # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/gateway-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/gateway-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09  # v6.0.0
        with:
          context: .
          file: Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/bolyra/gateway:${{ steps.version.outputs.version }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'ghcr.io/bolyra/gateway:latest' || '' }}
          build-args: |
            GATEWAY_VERSION=${{ steps.version.outputs.version == 'dev' && 'latest' || steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GWVER="${VERSION:-latest}"
          [ "$GWVER" = "dev" ] && GWVER="latest"
          docker build -f Dockerfile.gateway \
            --build-arg GATEWAY_VERSION=$GWVER \
            -t bolyra-gateway-smoke .
          docker run --rm -d -p 4100:4100 --name gw-smoke \
            bolyra-gateway-smoke --target http://localhost:9999/mcp --dev
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4100/healthz || true)
          docker stop gw-smoke || true
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            echo "Smoke test failed: /healthz returned $STATUS (expected 200 or 503)"
            exit 1
          fi
          echo "Smoke test passed: /healthz returned $STATUS"
