name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: Verify Signed-off-by on every commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR commits
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          range="${BASE_SHA}..${HEAD_SHA}"
          missing=0
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            expected="Signed-off-by: ${author_name} <${author_email}>"
            body=$(git log -1 --format='%B' "$sha")
            if ! printf '%s\n' "$body" | grep -Fxq "$expected"; then
              echo "::error::Commit $sha is missing DCO sign-off."
              echo "  expected trailer: $expected"
              echo "  full message:"
              printf '%s\n' "$body" | sed 's/^/    /'
              missing=$((missing + 1))
            fi
          done < <(git rev-list "$range")
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing commit(s) missing DCO sign-off. Run: git commit --amend -s --no-edit"
            exit 1
          fi
          echo "All commits in $range carry a valid Signed-off-by trailer."
